sites:
  local:
    description: "Env on local machine"
    conf: |
      INHERIT += "rm_work"
      PREFERRED_VERSION_tpm2-tss-engine = "1.2.0"
      BBMASK += "recipes-tpm2/tpm2-tss-engine/tpm2-tss-engine_1.2.0.bb"
      BBMASK += "meta-intel/recipes-selftest/images/secure-boot-selftest-image-unsigned.bb"
      OE_TERMINAL = "screen"

core:
  layers:
    - core
  conf: |
    #DISTRO = "poky"
    DISTRO = "pixelatedrailroad"
    INIT_MANAGER = "systemd"
    DISTRO_FEATURES:append = " pam wayland systemd"
    CORE_IMAGE_EXTRA_INSTALL:append = " openssh-sshd iproute2"
    IMAGE_FSTYPES:append = "wic.bz2 wic.bmap"
    # whisk will automatically BBMASK layers in any submod present but nit in the above layers
    #
    # 
    # silence warning about no .bb files present
    BB_PATTERN_IGNORE_EMPTY:pixelatedrailroad = "1"
    BB_PATTERN_IGNORE_EMPTY:meta-raspberrypi = "1"
    BB_PATTERN_IGNORE_EMPTY:meta-raspberrypi-tcook = "1"
    BB_PATTERN_IGNORE_EMPTY:swupdate = "1"
    BB_PATTERN_IGNORE_EMPTY:meta-virtualization = "1"
    BB_PATTERN_IGNORE_EMPTY:tpm-layer = "1"
    BB_PATTERN_IGNORE_EMPTY:meta-python = "1"
    BB_PATTERN_IGNORE_EMPTY:security = "1"
    BB_PATTERN_IGNORE_EMPTY:secure-core = "1"
    BB_PATTERN_IGNORE_EMPTY:efi-boot-signature = "1"
    BB_PATTERN_IGNORE_EMPTY:tpm2 = "1"
    BB_PATTERN_IGNORE_EMPTY:signing_key = "1"
    BB_PATTERN_IGNORE_EMPTY:integrity_layer = "1"
    BB_PATTERN_IGNORE_EMPTY:webserver = "1"
    BB_PATTERN_IGNORE_EMPTY:meta-python = "1"
    BB_PATTERN_IGNORE_EMPTY:perl-layer = "1"
    BB_PATTERN_IGNORE_EMPTY:openembedded-layer = "1"
    BB_PATTERN_IGNORE_EMPTY:networking-layer = "1"
    BB_PATTERN_IGNORE_EMPTY:filesystems-layer = "1"
    BB_PATTERN_IGNORE_EMPTY:intel = "1"
    BB_PATTERN_IGNORE_EMPTY:raspberrypi = "1"
    BB_PATTERN_IGNORE_EMPTY:efibootguard = "1"
    BB_PATTERN_IGNORE_EMPTY:meta-arm = "1"
    BB_PATTERN_IGNORE_EMPTY:arm-toolchain = "1"
    BB_PATTERN_IGNORE_EMPTY:openamp-layer = "1"
    BB_PATTERN_IGNORE_EMPTY: = "1"
    BB_PATTERN_IGNORE_EMPTY: = "1"
    BB_PATTERN_IGNORE_EMPTY: = "1"

# Defines the specific Raspberry Pi target hardware
products:
    raspberrypi3:
      description: "Raspberry Pi 3B 64-bit Target"
      default_version: styhead
      layers:
        - core
        - raspberrypi
        - arm
        - virtualization
        - secure-core
        - security
        - swupdate
        - tcook-raspberrypi
      targets:
        - mc:product-pi3:core-image-full-cmdline
        - mc:product-pi3:core-image-full-cmdline-swu
      conf: |
        DISTRO = "pixelatedrailroad"
        MACHINE = "raspberrypi3-64"
        SWVERSION = "${PI3_VERSION}"
        RM_WORK_EXCLUDE += " core-image-full-cmdline"
    raspberrypi4:
      description: "Raspberry Pi 4 64-bit Target"
      default_version: styhead
      layers:
        - core
        - raspberrypi
        - arm
        - virtualization
        - secure-core
        - security
        - swupdate
        - tcook-raspberrypi
      targets:
        - mc:product-pi4:core-image-full-cmdline
        - mc:product-pi4:core-image-full-cmdline-swu
      conf: |
        DISTRO = "pixelatedrailroad"
        MACHINE = "raspberrypi4-64"
        SWVERSION = "${PI4_VERSION}"
        RM_WORK_EXCLUDE += " core-image-full-cmdline"
    raspberrypi5:
      description: "Raspberry Pi 5 64-bit Target"
      default_version: styhead
      layers:
        - core
        - raspberrypi
        - arm
        - virtualization
        - secure-core
        - security
        - swupdate
        - tcook-raspberrypi
      targets:
        - mc:product-pi5:core-image-full-cmdline
        - mc:product-pi5:core-image-full-cmdline-swu
      conf: |
        DISTRO = "pixelatedrailroad"
        MACHINE = "raspberrypi5"
        SWVERSION = "${PI5_VERSION}"
        RM_WORK_EXCLUDE += " core-image-full-cmdline"

# build mode options
modes:
    development:
      description: "Debug build with root access"
      conf: |
        IMAGE_FEATURES[validateitems] += "development"
        IMAGE_FEATURES:append = " development"
    manufacturing:
      description: "Limited capabilities for target manufacturer build"
      conf: |
        IMAGE_FEATURES[validateitems] += "manufacturing"
        IMAGE_FEATURES:append = " manufacturing"
    production:
      description: "Hardened user production build"
      conf: |
        IMAGE_FEATURES[validateitems] += "production"
        IMAGE_FEATURES:append = " production"
    release:
      description: "Release build with all features enabled"
      conf: |
        IMAGE_FEATURES[validateitems] += "release"
        IMAGE_FEATURES:append = " release"
