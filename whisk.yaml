version: 2.0

defaults:
  site: local
  mode: development

# use for setup as needed, e.g., for setting up a local mirror of the Yocto Project,
# passing in environment variables, or other pre-build configuration steps.
hooks:
  pre_init: |
    echo "Starting build mode..."
    source %{WHISK_PROJECT_ROOT}/scripts/generate_sw_versions export
    #
    #
    PYREX_CONFIG_BIND="%{WHISK_PROJECT_ROOT} ~/.ssh/"
    export BB_ENV_PASSTHROUGH_ADDITIONS="${BB_ENV_PASSTHROUGH_ADDITIONS} \
    NDDSHOME \
    RPI3_VERSION RPI4_VERSION RPI5_VERSION "

versions:
  wrynose:
    description: "Yocto 6.0 (Wrynose) branch build of Yocto Project and essential layers for practice"
    oeinit: "%{WHISK_PROJECT_ROOT}/layers/open-source/poky/oe-init-build-env"
    pyrex:
      root: "%{WHISK_PROJECT_ROOT}/layers/pyrex"
      conf: "%{WHISK_PROJECT_ROOT}/layers/pyrex.ini"
      # I'm including all of the sub-layers for now, but I will likely trim this down to just
      # the ones I need for my builds.
    layers:
      - name: core
        paths: 
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/poky"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-poky"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-selftest"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-skeleton"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-yocto-bsp"
        fetch:
          commands:
            - git submodule update --init layers/open-source/poky

      - name: oe
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-oe"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-gnome"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-initramfs"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-python"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-networking"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-filesystems"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-multimedia"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-perl"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-webserver"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-openembedded
        # All of these for working with security recipes, hardening, and TPM features on Targets
      - name: security
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security/meta-hardening"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security/meta-integrity"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security/meta-parsec"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security/meta-tpm"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-security
      # This will help with learning to use Trusted Platform Module (TPM) and secure boot
      # features on various targets.
      - name: secure-core
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-efi-secure-boot"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-encrypted-storage"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-ids"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-secure-core-common"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-signing-key"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-tpm2"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-secure-core
      - name: swupdate
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-swupdate"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-swupdate
      - name: efibootguard
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-efibootguard"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-efibootguard
      - name: virtualization
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-virtualization"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-virtualization
      - name: arm
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-arm"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-arm
      # Target-specific layers for various builds
      - name: raspberrypi
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-raspberrypi"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-raspberrypi
      # This is my custom layer for RPi Builds.
      - name: tcook-raspberrypi
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/common/meta-raspberrypi-tcook"
        fetch:
          commands:
            - git submodule update --init layers/common/meta-raspberrypi-tcook
      - name: tcook-common
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/common/meta-tcook-common"
        fetch:
          commands:
            - git submodule update --init layers/common/meta-tcook-common
            
