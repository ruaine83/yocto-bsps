version: '2.0'

defaults:
  site: local
  mode: development

# use for setup as needed, e.g., for setting up a local mirror of the Yocto Project,
# passing in environment variables, or other pre-build configuration steps.
hooks:
  pre-build:
    - echo "Starting build for ${product} in ${mode} mode..."
  post-build:
    - echo "Build completed for ${product} in ${mode} mode."


version:
  open-source:
    description: "Open-source layers (version selected via branches) build of Yocto Project and essential layers for practice"
    oeinit: "%{WHISK_PROJECT_ROOT}/layers/open-source/poky/oe-init-build-env"
    pyrex:
      root: "%{WHISK_PROJECT_ROOT}/layers/open-source/pyrex"
      conf: "%{WHISK_PROJECT_ROOT}/layers/open-source/pyrex.ini"
      # I'm including all of the sub-layers for now, but I will likely trim this down to just
      # the ones I need for my builds.
    layers:
      - name: core
        paths: 
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/poky"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-poky"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-selftest"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-skeleton"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-yocto-bsp"
        fetch:
          commands:
            - git submodule update --init layers/open-source/poky

      - name: meta-oe
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-oe"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-gnome"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-initramfs"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-python"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-networking"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-filesystems"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-multimedia"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-perl"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-openembedded/meta-webserver"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-openembedded
        # All of these for working with security recipes, hardening, and TPM features on Targets
      - name: meta-security
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security/meta-hardening"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security/meta-integrity"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security/meta-parsec"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-security/meta-tpm"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-security
      # This will help with learning to use Trusted Platform Module (TPM) and secure boot
      # features on various targets.
      - name: meta-secure-core
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-efi-secure-boot"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-encrypted-storage"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-ids"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-secure-core-common"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-signing-key"
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-secure-core/meta-tpm2"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-secure-core
      - name: meta-swupdate
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-swupdate"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-swupdate
      - name: meta-efibootguard
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-efibootguard"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-efibootguard
      - name: meta-virtualization
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-virtualization"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-virtualization
      # Target-specific layers for various builds
      - name: meta-raspberrypi
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/open-source/meta-raspberrypi"
        fetch:
          commands:
            - git submodule update --init layers/open-source/meta-raspberrypi
      # This is my custom layer for RPi Builds.
      - name: tcook-raspberrypi
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/common/meta-raspberrypi-tcook"
        fetch:
          commands:
            - git submodule update --init layers/common/meta-raspberrypi-tcook

  blacksail:
    description: "blacksail branch build of Yocto Project and essential layers for practice"
    oeinit: "%{WHISK_PROJECT_ROOT}/layers/blacksail/poky/oe-init-build-env"
    pyrex:
      root: "%{WHISK_PROJECT_ROOT}/layers/blacksail/pyrex"
      conf: "%{WHISK_PROJECT_ROOT}/layers/blacksail/pyrex.ini"
      # I'm including all of the sub-layers for now, but I will likely trim this down to just
      # the ones I need for my builds.
    layers:
      - name: core
        paths: 
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/poky"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-poky"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-selftest"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-skeleton"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-yocto-bsp"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/poky

      - name: meta-oe
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-oe"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-gnome"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-initramfs"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-python"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-networking"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-filesystems"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-multimedia"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-perl"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-openembedded/meta-webserver"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/meta-openembedded
        # All of these for working with security recipes, hardening, and TPM features on Targets
      - name: meta-security
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-security"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-security/meta-hardening"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-security/meta-integrity"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-security/meta-parsec"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-security/meta-tpm"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/meta-security
      # This will help with learning to use Trusted Platform Module (TPM) and secure boot
      # features on various targets.
      - name: meta-secure-core
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-secure-core/meta-efi-secure-boot"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-secure-core/meta-encrypted-storage"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-secure-core/meta-ids"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-secure-core/meta-secure-core-common"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-secure-core/meta-signing-key"
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-secure-core/meta-tpm2"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/meta-secure-core
      - name: meta-swupdate
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-swupdate"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/meta-swupdate
      - name: meta-efibootguard
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-efibootguard"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/meta-efibootguard
      - name: meta-virtualization
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-virtualization"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/meta-virtualization
      # Target-specific layers for various builds
      - name: meta-raspberrypi
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-raspberrypi"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/meta-raspberrypi
      # This is my custom layer for RPi Builds.
      - name: tcook-raspberrypi
        paths:
        - "%{WHISK_PROJECT_ROOT}/layers/blacksail/meta-raspberrypi-tcook"
        fetch:
          commands:
            - git submodule update --init layers/blacksail/meta-raspberrypi-tcook














# Pins all essential layers to the stable blacksail branch 
sources:
  poky:
    url: "git://git.yoctoproject.org/poky.git"
    ref: "blacksail"
  meta-openembedded:
    url: "git://git.openembedded.org/meta-openembedded"
    ref: "blacksail"
  meta-raspberrypi:
    url: "git://git.yoctoproject.org/meta-raspberrypi.git"
    ref: "blacksail"

# Defines the specific Raspberry Pi target hardware
axes:
  product:
    choices:
      pi3:
        description: "Raspberry Pi 3 32-bit Target"
        
        variables:
          MACHINE: "raspberrypi3"
      pi3b:
        description: "Raspberry Pi 3B 64-bit Target"
        variables:
          MACHINE: "raspberrypi3b-64"
      pi4:
        description: "Raspberry Pi 4 64-bit Target"
        variables:
          MACHINE: "raspberrypi4-64"
      pi5:
        description: "Raspberry Pi 5 64-bit Target"
        variables:
          MACHINE: "raspberrypi5"
  mode:
    choices:
      development:
        description: "Debug build with root access"
        variables:
          EXTRA_IMAGE_FEATURES: "debug-tweaks"
      production:
        description: "Hardened user production build"
